services:
  - type: web
    name: wander-web
    runtime: node
    plan: free
    rootDir: ent_app
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DASHSCOPE_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: QWEN_INTENT_MODEL
        value: qwen-plus
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: AMAP_WEB_SERVICE_KEY
        sync: false
      - key: VITE_AMAP_JS_KEY
        sync: false
      - key: VITE_AMAP_SECURITY_JSCODE
        sync: false
