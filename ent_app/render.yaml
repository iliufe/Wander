services:
  - type: web
    name: wander-web
    runtime: node
    rootDir: ent_app
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DASHSCOPE_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: QWEN_INTENT_MODEL
        value: qwen-plus
      - key: WANDER_QWEN_BLUEPRINT_TIMEOUT_MS
        value: 6500
      - key: AMAP_REQUEST_TIMEOUT_MS
        value: 3500
      - key: AMAP_REQUEST_RETRIES
        value: 1
      - key: WANDER_MAX_SEARCH_TERMS_PER_STOP
        value: 3
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: AMAP_WEB_SERVICE_KEY
        sync: false
      - key: VITE_AMAP_JS_KEY
        sync: false
      - key: VITE_AMAP_SECURITY_JSCODE
        sync: false
      - key: WANDER_BASIC_AUTH_USER
        sync: false
      - key: WANDER_BASIC_AUTH_PASSWORD
        sync: false
